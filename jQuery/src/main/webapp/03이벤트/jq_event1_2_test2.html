<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 선택 체크박스 예제</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
	<h1>학생 목록</h1>
	<table>
	    <thead>
	        <tr>
	            <th><input type="checkbox" id="selectAll"> 전체 선택</th>
	            <th>학생 이름</th>
	        </tr>
	    </thead>
	    <tbody>
	        <tr>
	            <td><input type="checkbox" class="studentCheckbox"></td>
	            <td>학생 1</td>
	        </tr>
	        <tr>
	            <td><input type="checkbox" class="studentCheckbox"></td>
	            <td>학생 2</td>
	        </tr>
	        <tr>
	            <td><input type="checkbox" class="studentCheckbox"></td>
	            <td>학생 3</td>
	        </tr>
	        <tr>
	            <td><input type="checkbox" class="studentCheckbox"></td>
	            <td>학생 4</td>
	        </tr>
	    </tbody>
	</table>

	<script>
		
		$(".studentCheckbox").on("change", function(){
			// 학생 체크박스 요소 전체 선택
			console.log($(this).parent().next().text() + (this.checked ? ' 체크됨' : ' 체크 해제됨'));
		});
		
		// 전체 선택을 위한 체크박스 요소
		$("#selectAll").on("click", function(){
			// 체크박스 요소 클릭 시 실행
			// 전체 선택된 체크박스의 상태를 selectAll 요소의 checked 상태로 변경
			$(".studentCheckbox").prop('checked', this.checked).trigger("change");
		});
		
		
		
		
	</script>

</body>
</html>
