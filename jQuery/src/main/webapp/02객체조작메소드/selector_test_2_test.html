<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="ko" xml:lang="ko">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<title> 객체 조작 및 생성 </title>

<script src="http://code.jquery.com/jquery-latest.min.js"></script>

<script type="text/javascript">

	$(function(){
		// 방법1.  <li>내용3</li> 선택해서 가져와 바깥 테두리 선 굵기 1px, 가는 실선, 노란색 선으로 설정
		$("ul>li:eq(2)").css("border", "1px solid yellow");
		
		// 방법2.
		$("#myList li:eq(2)").css("color", "red");
		
		// 방법3.
		$("li").each(function(index, element){
			if($(element).text() === "내용3"){
				$(element).css({"backgroundColor":"aqua", "font-size":"20px"});
			}
		});
		
		// 방법4.
		$("#myList li:contains('내용3')").css("text-align", "center");
		
		
	});
</script>
</head>
<body>
	<ul id="myList">
	  <li>내용1</li>
	  <li>내용2</li>
	  <li>내용3</li>
	  <li>내용4</li>
	</ul>
</body>
</html>
