<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

  <style>
  	 
  	 #student-list{  list-style-type:none;  padding:0;}/*불릿 동그라미 기호 없애서 학생목록 스타일 설정*/
  	 .student-item{  margin: 5px  0;} /*각 학생 이름 li항목의 바깥 여백(마진 설정)*/
  	
  </style>

  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
</head>
<body>
	<h1>학생 관리 시스템</h1>
	<div>
		<!-- 학생 이름 입력 input -->
		<input type="text" id="student-name" placeholder="학생이름" value="">
	
		<!-- 학생 추가 버튼 -->
		<button id="add-student">추가</button>
	</div>
	
	<!-- 학생 이름 목록을 표시할 ul요소 영역 -->
	<ul id="student-list"></ul>	
	
	<script type="text/javascript">
		//학생들의 이름들을 문자열로 저장 시킬 비어 있는 배열 생성 후 let students변수에 저장
		let students = [];
		//let students = ["김개똥"];
		//let students = ["김개똥","김구"];
		//let students = ["김개똥"];     
	
		
		// 버튼 클릭 시 호출되는 학생 추가 함수
		function addStudent(name){
			
			students.push(name);
			renderList();
		}
		
		// 삭제 버튼 클릭 시 호출되는 학생 삭제 함수
		function deleteStudent(name){
			
			students = $.grep(students, function(s){
				return s != name;
			});
			renderList();
		}
		
		
		// 학생 추가 시 브라우저 화면을 업데이트 하기 위한 렌더링 함수
		function renderList(){
			// 렌더링을 하기 전 ul 요소를 우선 비워줌
			$("#student-list").empty();
			
			// sutdents 배열의 학생 수 만큼 li 리스트 생성
			$.each(students, function(index, student){
				
				// 삭제 버튼을 포함한 li 리스트 하나 생성해서 추가
				$("#student-list").append(`<li class="student-item">${student}<button class="delete-student" data-name="${student}">삭제</button></li>`);
				
			});
		}	

		// 삭제 버튼을 눌렀을 때 학생을 목록에서 삭제하기 위해 이벤트 등록
		$("#student-list").on("click", ".delete-student", function(){
			
			const studentName = $(this).data('name');
			
			deleteStudent(studentName);
			
		});
		
		
		// 동적으로 생성된 학생 추가 버튼 객체에 click 이벤트 추가
		$("#add-student").on("click", function(){
			
			// input 객체의 value를 가져옴
			const studentName = $("#student-name").val().trim();
			
			// input 객체의 value 값을 비워줌
			$("#student-name").val('').focus();
			
			if(!studentName || $.inArray(studentName, students) !== -1){
				alert("입력한 이름이 공백이거나, 이미 목록에 존재합니다.");
				return;
			}
			
			// addStudent 함수 호출
			addStudent(studentName);
			
		});
		
		
		
		// input 요소에서 엔터키 입력을 통한 이벤트 추가
		$("#student-name").on("keyup", function(e){
			if(e.key !== "Enter")
				return;
			
			// input 객체의 value를 가져옴
			const studentName = $("#student-name").val().trim();
			
			// input 객체의 value 값을 비워줌
			$("#student-name").val('').focus();
			
			if(!studentName || $.inArray(studentName, students) !== -1){
				alert("입력한 이름이 공백이거나, 이미 목록에 존재합니다.");
				return;
			}
			
			// addStudent 함수 호출
			addStudent(studentName);
			
		});

	</script>
	
</body>
</html>
