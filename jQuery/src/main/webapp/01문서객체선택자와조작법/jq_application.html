<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script type="text/javascript">
 		//배열
 		const arr1 = ["apple", "banana", "orange"];
 		//				0          1          2       index
 		const arr2 = ["grape",  "lemon",  "peach"];
 		//				0          1          2       index

		const mergedArr = $.merge(arr1, arr2);
 		
 		// 찾을 데이터가 배열에 존재한다면 저장된 위치 반환
 		const index = $.inArray("lemon", mergedArr);
 		
 		if(index > -1){
 			console.log("lemon is at index " + index);
 		}
 		
 		// mergedArr 배열에서 "a" 문자를 포함한 문자열만 반환해서 새로운 배열 생성
 		const filteredArr = $.grep(mergedArr, e => e.includes("a"));
 		
 		console.log(JSON.stringify(filteredArr));
 		
 		// filteredArr 배열의 값을 대문자로 변환해서 새로운 배열 생성
 		const resultArr = $.map(filteredArr, e => e.toUpperCase());
 		
 		console.log(JSON.stringify(resultArr));
		
  </script>
 
</head>
<body>

</body>
</html>
