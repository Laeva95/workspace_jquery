<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #todoList {
            margin-top: 20px;
        }
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            margin-bottom: 5px;
        }
        .remove-btn, #remove-all {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
   
    <script>

	/*
		.html() 메소드
		
		- $("선택자")로 선택한 HTML요소 내부에 작성된 HTML요소를 가져오거나 교체할때 사용하는 메소드 
		- 기본 작성 문법
				1)  내용 가져오기 
					$("선택자").html();
					설명 :  "선택자"로 선택한 요소 내부에 작성된 HTML요소를 가져옴 								
					예를 들어   <div><span>바보똥개</span></div>.html(); ->  <span>바보똥개</span> 가져옴 
	
				2) 내용 변경하기 
					$("선택자").html("<p>새 내용</p>");
					설명 :  "선택자" 선택한 요소 내부에 작성된 기존HTML요소를 모두 지우고, 새 HTML요소로 교체 
					예를 들어  <div><span>바보똥개</span></div>.html("<p>새 내용</p>");
					         -><div><p>새 내용</p></div> 으로 교체 됨 													

		find() 메소드
		- 선택한 요소의 내부(자손 요소들)중에서 원하는 요소를 찾아 선택할떄 사용하는 메소드.
		- 문법
				$(기준요소선택).find("찾고싶은 하위요소 선택");
		- 즉, find메소드는 기준 요소 안에 작성된 하위요소를 찾는다.
		-    직계 자식요소 뿐만 아니라 더 깊은 단계 까지의 후손요소를 모두 탐색해서 찾을 떄 사용되는 메소드.

*/		
		$(function(){
			// 추가 버튼에 click 이벤트 등록
			$("#addTodoBtn").on("click", function(){
				
				// input 요소에 입력한 할일을 공백 없이 가져옴
				const todo = $("#todoInput").val().trim();
				
				// 입력한 todo가 공백인지 아닌지 확인
				if(todo){
					addTodoList(todo);
				}else{
					alert("내용을 입력해주세요");
				}
				
				// 확인 후 input 내용을 삭제하고, focus 상태로
				$("#todoInput").val("").focus();
			});
			
			// 키보드 엔터 입력시 이벤트 등록
			$("#todoInput").on("keyup", function(e){
				if(e.key !== "Enter")
					return;
				
				// input 요소에 입력한 할일을 공백 없이 가져옴
				const todo = $("#todoInput").val().trim();
				
				// 입력한 todo가 공백인지 아닌지 확인
				if(todo){
					addTodoList(todo);
				}else{
					alert("내용을 입력해주세요");
				}
				
				// 확인 후 input 내용을 삭제하고, focus 상태로
				$("#todoInput").val("").focus();
			});
			
			// 입력한 todo 문자열을 todoList div 요소에 추가시키는 함수
			function addTodoList(todoList) {
				// 입력한 todo 문자열을 추가할 div 요소를 동적으로 생성
				const todoItem = $('<div class="todo-item"></div>');
				
				// 생성한 div 요소 내부에 span, button 요소 추가
				todoItem.html(`<span>${todoList}</span><button class="remove-btn">삭제</button>`);
				
				// 생성한 div 요소를 기존 div 요소의 자식 요소로 추가
				$("#todoList").append(todoItem);
				
				// find() 메서드를 사용해서 button 요소를 찾아서 click 이벤트 함수 등록
				todoItem.find(".remove-btn").click(function(){
					
					// 동적으로 생성한 할일 목록 div 제거
					todoItem.remove();
					
				});
				
			}
			
			$("#remove-all").click(function(){
				$("#todoList").empty();
			});
			
		});
    </script>
</head>
<body>
    <h1>할 일 목록</h1>
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
    <button id="addTodoBtn">추가</button>
    <button id="remove-all">전체 삭제</button>

    <div id="todoList"></div>

</body>
</html>
