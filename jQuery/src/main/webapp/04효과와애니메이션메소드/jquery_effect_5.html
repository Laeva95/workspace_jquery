<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	
	<style>
		h1{  width:300px;  height:200px;  background-color: yellow; } 
	</style> 
	
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script type="text/javascript">
		$(function(){
			// h1 요소를 상수에 저장
			const h1 = $("h1");
			
			// id=btn1 요소에 클릭 이벤트를 등록해서 1초동안 위로 접으면서 숨기는 효과 적용
			$("button:eq(0)").on("click", () => h1.slideUp(1000));
			
			// id=btn2 요소에 클릭 이벤트를 등록해서 3초동안 아래로 펼치면서 노출되는 효과 적용
			$("button:eq(1)").on("click", () => h1.slideDown(3000));
			
			// id=btn3 요소에 클릭 이벤트를 등록해서 1초동안 토글 효과 적용
			$("button:eq(2)").on("click", () => h1.slideToggle(1000));
			
		});
	</script>
	
</head>
<body>
	<button id="btn1">slideUp</button>
	<button id="btn2">slideDown</button>
	<button id="btn3">slideToggle</button>
	<h1>내용</h1>
	
	
	
	
	
	
	
</body>
</html>
